name: Generate GitHub Snake

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: meshmuhammadasaadg
          outputs: |
            assets/github-snake.svg
            assets/github-snake-dark.svg?palette=github-dark

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/*
          git commit -m "update snake" || echo "no changes"
          git push
